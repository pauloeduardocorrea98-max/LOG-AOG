<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Logística AOG | LATAM</title>
<style>
*{box-sizing:border-box;font-family:Segoe UI,Arial}
body{ margin:0; display:flex; background:#0b2440; color:#e5e7eb; }
.sidebar{ width:260px; background:#0f172a;color:#e5e7eb; display:flex;flex-direction:column;padding:12px }
.sidebar h2{margin:0 0 10px;font-size:16px;color:#38bdf8}
.menu button{
  width:100%; background:none;border:none;color:#e5e7eb;
  padding:10px 12px;text-align:left;cursor:pointer;
  border-radius:8px;margin-bottom:6px;
  display:flex;align-items:center;gap:10px;
  white-space:nowrap;
}
.menu button:hover,.menu button.active{background:#1e293b;color:#38bdf8}
.clock{ margin-top:0; margin-bottom:12px; text-align:center; font-size:14px; padding:10px 0; border-top:1px solid #334155; border-bottom:1px solid #334155; }
.connectedBox{ margin-top:10px; padding:10px; border:1px solid #334155; border-radius:10px; background:#0b1d33; font-size:12px; color:#e5e7eb; }
.connectedBox .title{ font-weight:700; color:#38bdf8; margin-bottom:6px; }
.connectedBox .item{ margin-top:4px; opacity:.95; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.content{flex:1;padding:16px}
h1{ margin:8px 0 10px; font-size:20px; color:#f8fafc; }
.section{display:none}
.section.active{display:block}
.noteRow{ display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap; margin-top:6px; }
.noteInput{
  width:80%; min-width:280px; min-height:74px; padding:10px;
  border:1px solid #e5e7eb; border-radius:10px; outline:none; resize:vertical;
  white-space:pre-wrap; overflow-wrap:anywhere; word-break:break-word; overflow-x:hidden;
  background:#fff; color:#0f172a;
}
.noteInput:focus{ border-color:#38bdf8; box-shadow:0 0 0 3px rgba(56,189,248,.18); }
.noteTools{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.noteBtn{ padding:10px 12px; border:none; background:#0ea5e9; color:#fff; border-radius:10px; cursor:pointer; }
.noteBtn:hover{filter:brightness(.95)}
.noteBtn.gray{ background:#334155; }
.noteBtn.orange{ background:#c2410c; }

.tableWrap{overflow:auto;border-radius:10px}
table{ width:100%; border-collapse:collapse; background:#fff; font-size:13px; min-width:1500px; color:#0f172a; }
th,td{ border:1px solid #e5e7eb; padding:6px; vertical-align:top; }
th{ background:#f1f5f9; position:sticky; top:0; z-index:2; }

.statusTag{ display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border-radius:999px; border:1px solid #e5e7eb; font-size:12px; line-height:1.2; white-space:nowrap; }
.statusDot{ width:8px;height:8px;border-radius:999px; display:inline-block; flex:none; }
.status-green{ background:#ecfdf5; border-color:#a7f3d0; color:#065f46; } .status-green .statusDot{ background:#10b981; }
.status-yellow{ background:#fffbeb; border-color:#fde68a; color:#92400e; } .status-yellow .statusDot{ background:#f59e0b; }
.status-red{ background:#fef2f2; border-color:#fecaca; color:#991b1b; } .status-red .statusDot{ background:#ef4444; }
.status-orange{ background:#fff7ed; border-color:#fdba74; color:#9a3412; } .status-orange .statusDot{ background:#c2410c; }
.status-default{ background:#f8fafc; border-color:#e5e7eb; color:#334155; } .status-default .statusDot{ background:#64748b; }

.obsArea{
  width:100%; min-width:220px; min-height:54px; padding:8px;
  border:1px solid #e5e7eb; border-radius:10px; outline:none; resize:vertical; font-size:12px;
  white-space:pre-wrap; overflow-wrap:anywhere; word-break:break-word; overflow-x:hidden;
}
.obsArea:focus{ border-color:#38bdf8; box-shadow:0 0 0 3px rgba(56,189,248,.18); }

.loginOverlay{
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background: rgba(0,0,0,.35); z-index:99999;
}
.loginBox{
  width:min(720px, calc(100vw - 32px));
  border:1px solid rgba(148,163,184,.35);
  background: linear-gradient(180deg, rgba(15,23,42,.95), rgba(2,6,23,.92));
  border-radius:18px;
  padding:18px 18px 16px;
  box-shadow:0 30px 90px rgba(0,0,0,.35);
}
.loginTitle{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:16px; }
.loginSub{ margin-top:6px; font-size:12px; color:#94a3b8; line-height:1.4; }
.loginRow{ display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
.loginRow input{
  flex:1; min-width:220px;
  padding:12px 12px; border-radius:12px; border:1px solid rgba(148,163,184,.25);
  background: rgba(2,6,23,.35); color:#e5e7eb; outline:none;
}
.loginRow input:focus{ border-color:#38bdf8; box-shadow:0 0 0 3px rgba(56,189,248,.18); }
.loginActions{ display:flex; gap:10px; justify-content:flex-end; margin-top:12px; }
.loginMsg{ margin-top:10px; font-size:12px; color:#fca5a5; min-height:16px; }
.btn{ padding:10px 14px; border:none; border-radius:12px; cursor:pointer; font-weight:700; }
.btnPrimary{ background:#0ea5e9; color:#fff; }
.btnGray{ background:#334155; color:#fff; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>LOGÍSTICA AOG</h2>
  <div class="clock" id="clock"></div>

  <div class="connectedBox" id="connectedBox">
    <div class="title">👥 Conectados</div>
    <div class="item">Carregando…</div>
  </div>

  <div class="menu">
    <button class="active" onclick="openTab('turno',this)">📓 Passagem de Turno</button>
    <button onclick="openTab('aog',this)">✈️ AOG</button>
  </div>
</div>

<div class="content">
  <div id="turno" class="section active">
    <h1>Passagem de Turno</h1>
    <div class="noteRow">
      <div id="turnoInput" class="noteInput" contenteditable="true"></div>
      <div class="noteTools">
        <button class="noteBtn" type="button" onclick="addTurno()">Adicionar</button>
        <button class="noteBtn gray" type="button" onclick="refreshData()">Atualizar agora</button>
      </div>
    </div>
    <div id="turnoList" class="noteInput" style="background:#fff;color:#0f172a;min-height:100px"></div>
  </div>

  <div id="aog" class="section">
    <h1>AOG</h1>
    <div class="tableWrap"><table id="tbl-aog"></table></div>
  </div>
</div>

<div id="loginOverlay" class="loginOverlay" style="display:none">
  <div class="loginBox">
    <div class="loginTitle">🔒 Acesso ao LOG-AOG</div>
    <div class="loginSub">
      Entre com seu <b>email LATAM</b> e seu <b>PIN</b> para abrir o dashboard.
      (O PIN fica salvo somente neste navegador.)
    </div>
    <div class="loginRow">
      <input id="loginEmail" type="email" placeholder="email@latam.com" autocomplete="username">
      <input id="loginPin" type="password" placeholder="PIN" autocomplete="current-password">
    </div>
    <div class="loginActions">
      <button class="btn btnGray" type="button" onclick="logout(true)">Limpar</button>
      <button class="btn btnPrimary" type="button" onclick="doLogin()">Entrar</button>
    </div>
    <div id="loginMsg" class="loginMsg"></div>
  </div>
</div>

<script>
/**
 * IMPORTANTE:
 * - Use SEMPRE o /exec no GitHub Pages
 * - O Web App do Apps Script precisa estar: "Quem tem acesso: Qualquer pessoa com o link" (ou "Qualquer pessoa")
 */
const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx1wU2tiPZC1_iW1SYiIOJe9WYnm93QpumnQlUd4UJKFiBh28T3wFfd3RGYoi_iUtQKng/exec";
const REFRESH_MS = 150000;

let __session = { email:"", pin:"" };
let dados = [];

/* ===== util ===== */
function escapeHtml(v){
  return String(v ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function setLoginMsg(s){ document.getElementById("loginMsg").innerText = s || ""; }

/* ===== JSONP (sem CORS) ===== */
function jsonp(params){
  return new Promise((resolve, reject)=>{
    const cbName = "__cb_" + Math.random().toString(36).slice(2);
    const url = new URL(GAS_WEBAPP_URL);
    Object.keys(params||{}).forEach(k => url.searchParams.set(k, String(params[k])));
    url.searchParams.set("callback", cbName);
    url.searchParams.set("ts", String(Date.now()));

    const script = document.createElement("script");
    script.src = url.toString();

    const timer = setTimeout(()=>cleanup(false, "timeout"), 15000);

    function cleanup(ok, err){
      clearTimeout(timer);
      try{ delete window[cbName]; }catch(e){}
      if(script && script.parentNode) script.parentNode.removeChild(script);
      if(ok) return;
      reject(new Error(err || "jsonp failed"));
    }

    window[cbName] = (data)=>{
      cleanup(true);
      resolve(data);
    };
    script.onerror = ()=>cleanup(false, "script error (provável permissão/URL)");
    document.body.appendChild(script);
  });
}

/* ===== Login ===== */
function loadSession(){
  try{
    const raw = localStorage.getItem("LOGAOG_SESSION_V1");
    if(raw){
      const s = JSON.parse(raw);
      if(s && s.email && s.pin) __session = { email:String(s.email), pin:String(s.pin) };
    }
  }catch(e){}
}
function saveSession(){
  try{ localStorage.setItem("LOGAOG_SESSION_V1", JSON.stringify(__session)); }catch(e){}
}
function logout(clearForm){
  __session = { email:"", pin:"" };
  try{ localStorage.removeItem("LOGAOG_SESSION_V1"); }catch(e){}
  if(clearForm){
    const e = document.getElementById("loginEmail"); const p = document.getElementById("loginPin");
    if(e) e.value = ""; if(p) p.value = "";
  }
  showLogin();
}
function showLogin(){
  document.getElementById("loginOverlay").style.display = "flex";
}
function hideLogin(){
  document.getElementById("loginOverlay").style.display = "none";
}
async function doLogin(){
  const email = String(document.getElementById("loginEmail").value||"").trim().toLowerCase();
  const pin = String(document.getElementById("loginPin").value||"").trim();
  if(!email || !pin){ setLoginMsg("Email e PIN obrigatórios"); return; }

  setLoginMsg("Validando...");
  try{
    const r = await jsonp({ auth:"1", email, pin });
    if(!r || r.ok !== true){
      setLoginMsg((r && r.error) ? r.error : "Falha no login");
      return;
    }
    __session = { email, pin };
    saveSession();
    hideLogin();
    await bootAfterLogin();
  }catch(err){
    setLoginMsg("Erro ao chamar o GAS. Verifique se o Web App está em /exec e com acesso público.");
    console.error(err);
  }
}

/* ===== App ===== */
function openTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function statusCategory(statusRaw){
  const s = String(statusRaw||"").toLowerCase();
  if(s.includes("outras") || s.includes("mtl divergente") || s.includes("mtldivergente")) return "orange";
  if(s.includes("em fila") || s.includes("aguardando") || s.includes("mtl zero") || s.includes("mtlzero")) return "red";
  if(s.includes("pronto para envio") || s.includes("log 1") || s.includes("transito") || s.includes("log1")) return "yellow";
  if(s.includes("base") || s.includes("recebido")) return "green";
  return "default";
}
function statusTagHtml(statusRaw){
  const txt = String(statusRaw ?? "");
  const cat = statusCategory(txt);
  return `<span class="statusTag status-${cat}"><span class="statusDot"></span><span>${escapeHtml(txt)}</span></span>`;
}

function renderTable(){
  const el = document.getElementById("tbl-aog");
  if(!el) return;
  const cols = ["Material_ID","Status_material_ferramenta","Numero_de_solicitacao","Data_da_solicitacao","Barcode","Aeronave","PN","QTDE","Origem","Destino","Descricao_logistica","Nota_fiscal","AWB","OBS"];
  let html = "<thead><tr>";
  for(const c of cols) html += `<th>${escapeHtml(c)}</th>`;
  html += "</tr></thead><tbody>";
  for(const r of (Array.isArray(dados)?dados:[]).slice(0,200)){
    html += "<tr>";
    for(const c of cols){
      if(c === "Status_material_ferramenta") html += `<td>${statusTagHtml(r[c])}</td>`;
      else html += `<td>${escapeHtml(r[c])}</td>`;
    }
    html += "</tr>";
  }
  html += "</tbody>";
  el.innerHTML = html;
}

async function refreshData(){
  if(!__session.email || !__session.pin){ showLogin(); return; }
  // 1) pega dados
  const r = await jsonp({ dados:"1", email:__session.email, pin:__session.pin });
  if(!r || r.ok !== true){
    throw new Error((r && r.error) ? r.error : "Falha ao buscar dados");
  }
  dados = Array.isArray(r.data) ? r.data : [];
  renderTable();

  // 2) presença (opcional)
  try{
    const pr = await jsonp({ presencePing:"1", email:__session.email, pin:__session.pin });
    renderConnected(pr && pr.users ? pr.users : []);
  }catch(e){}
}

function renderConnected(users){
  const box = document.getElementById("connectedBox");
  if(!box) return;
  const list = Array.isArray(users) ? users : [];
  if(list.length === 0){
    box.innerHTML = `<div class="title">👥 Conectados</div><div class="item">—</div>`;
    return;
  }
  box.innerHTML = [`<div class="title">👥 Conectados (${list.length})</div>`]
    .concat(list.slice(0,12).map(u=>`<div class="item">${escapeHtml(u.email || "desconhecido")}</div>`)).join("");
}

async function bootAfterLogin(){
  try{
    await refreshData();
    setInterval(()=>{ refreshData().catch(()=>{}); }, REFRESH_MS);
  }catch(e){
    console.error(e);
    alert("Login OK, mas falhou carregar dados. Abra o console (F12) para ver o erro.");
  }
}

/* ===== init ===== */
setInterval(()=>{ const el=document.getElementById("clock"); if(el) el.innerText = new Date().toLocaleTimeString("pt-BR"); }, 1000);

(function init(){
  loadSession();
  if(__session.email && __session.pin){
    document.getElementById("loginEmail").value = __session.email;
    document.getElementById("loginPin").value = __session.pin;
    hideLogin();
    bootAfterLogin();
  }else{
    showLogin();
  }
})();
</script>
</body>
</html>
