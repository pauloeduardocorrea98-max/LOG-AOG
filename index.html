<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logística AOG | LATAM</title>
<style>
*{box-sizing:border-box;font-family:Segoe UI,Arial}
body{ margin:0; display:flex; background:#0b2440; color:#e5e7eb; }
.sidebar{ width:260px; background:#0f172a;color:#e5e7eb; display:flex;flex-direction:column;padding:12px }
.sidebar h2{margin:0 0 10px;font-size:16px;color:#38bdf8}
.menu button{
  width:100%; background:none;border:none;color:#e5e7eb;
  padding:10px 12px;text-align:left;cursor:pointer;
  border-radius:8px;margin-bottom:6px;
  display:flex;align-items:center;gap:10px;
  white-space:nowrap;
}
.menu button:hover,.menu button.active{background:#1e293b;color:#38bdf8}
.clock{ margin-top:0; margin-bottom:12px; text-align:center; font-size:14px; padding:10px 0; border-top:1px solid #334155; border-bottom:1px solid #334155; }
.connectedBox{ margin-top:10px; padding:10px; border:1px solid #334155; border-radius:10px; background:#0b1d33; font-size:12px; color:#e5e7eb; }
.connectedBox .title{ font-weight:700; color:#38bdf8; margin-bottom:6px; }
.connectedBox .item{ margin-top:4px; opacity:.95; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.content{flex:1;padding:16px}
h1{ margin:8px 0 10px; font-size:20px; color:#f8fafc; }
.section{display:none}
.section.active{display:block}

.tableWrap{overflow:auto;border-radius:10px}
table{ width:100%; border-collapse:collapse; background:#fff; font-size:13px; min-width:1500px; color:#0f172a; }
th,td{ border:1px solid #e5e7eb; padding:6px; vertical-align:top; }
th{ background:#f1f5f9; position:sticky; top:0; z-index:2; }
.filterRow th{ background:#ffffff; position:sticky; top:34px; z-index:1; }
.filter{ width:100%; padding:6px; border:1px solid #e5e7eb; border-radius:6px; font-size:12px; }

.noteBtn{ padding:10px 12px; border:none; background:#0ea5e9; color:#fff; border-radius:10px; cursor:pointer; }
.noteBtn:hover{filter:brightness(.95)}
.noteBtn.gray{ background:#334155; }
.noteBtn.orange{ background:#c2410c; }

.statusTag{ display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border-radius:999px; border:1px solid #e5e7eb; font-size:12px; line-height:1.2; white-space:nowrap; }
.statusDot{ width:8px;height:8px;border-radius:999px; display:inline-block; flex:none; }
.status-green{ background:#ecfdf5; border-color:#a7f3d0; color:#065f46; } .status-green .statusDot{ background:#10b981; }
.status-yellow{ background:#fffbeb; border-color:#fde68a; color:#92400e; } .status-yellow .statusDot{ background:#f59e0b; }
.status-red{ background:#fef2f2; border-color:#fecaca; color:#991b1b; } .status-red .statusDot{ background:#ef4444; }
.status-orange{ background:#fff7ed; border-color:#fdba74; color:#9a3412; } .status-orange .statusDot{ background:#c2410c; }
.status-default{ background:#f8fafc; border-color:#e5e7eb; color:#334155; } .status-default .statusDot{ background:#64748b; }

.pagerBar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px;margin-bottom:10px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;color:#0f172a}
.small{font-size:12px;color:#94a3b8}
</style>
</head>
<body>
<div class="sidebar">
  <h2>LOGÍSTICA AOG</h2>
  <div class="clock" id="clock"></div>

  <div class="connectedBox" id="connectedBox">
    <div class="title">👥 Conectados</div>
    <div class="item">⚠️ indisponível</div>
  </div>

  <div class="menu">
    <button class="active" onclick="openTab('aog',this)">✈️ AOG</button>
    <button onclick="openTab('war',this)">⚔️ War Room</button>
    <button onclick="openTab('fast',this)">⚡ Fast Pass</button>
    <button onclick="openTab('cargo',this)">📦 Cargo Heroes</button>
    <button onclick="openTab('cargas',this)">🚚 Cargas</button>
    <button onclick="openTab('tools',this)">🛠️ Ferramentas</button>
  </div>
</div>

<div class="content">
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
    <button class="noteBtn gray" onclick="refreshNowUrl()">Atualizar agora (URL)</button>
    <button class="noteBtn orange" onclick="forceUpdateNow()">Forçar atualização (Sheets)</button>
    <span class="small" id="lastInfo">—</span>
  </div>

  <div id="aog" class="section active">
    <h1>AOG</h1>
    <div class="tableWrap">
      <div id="pager-aog" class="pagerBar"></div>
      <table id="tbl-aog"></table>
    </div>
  </div>

  <div id="war" class="section">
    <h1>War Room</h1>
    <div class="tableWrap">
      <div id="pager-war" class="pagerBar"></div>
      <table id="tbl-war"></table>
    </div>
  </div>

  <div id="fast" class="section">
    <h1>Fast Pass</h1>
    <div class="tableWrap">
      <div id="pager-fast" class="pagerBar"></div>
      <table id="tbl-fast"></table>
    </div>
  </div>

  <div id="cargo" class="section">
    <h1>Cargo Heroes</h1>
    <div class="tableWrap">
      <div id="pager-cargo" class="pagerBar"></div>
      <table id="tbl-cargo"></table>
    </div>
  </div>

  <div id="cargas" class="section">
    <h1>Cargas</h1>
    <div class="tableWrap">
      <div id="pager-cargas" class="pagerBar"></div>
      <table id="tbl-cargas"></table>
    </div>
  </div>

  <div id="tools" class="section">
    <h1>Ferramentas</h1>
    <div class="tableWrap">
      <div id="pager-tools" class="pagerBar"></div>
      <table id="tbl-tools"></table>
    </div>
  </div>
</div>

<script>
/**
 * ✅ IMPORTANTE:
 * - GitHub Pages não pode usar fetch() direto no GAS por CORS.
 * - Aqui usamos JSONP: cria um <script src="...&callback=...">
 */
const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx1wU2tiPZC1_iW1SYiIOJe9WYnm93QpumnQlUd4UJKFiBh28T3wFfd3RGYoi_iUtQKng/exec";

const REFRESH_EVERY_MS = 150 * 1000; // 2m30s

const cols = [
  "Material_ID","Status_material_ferramenta","Numero_de_solicitacao","Data_da_solicitacao",
  "Barcode","Aeronave","PN","QTDE","Origem","Destino","Descricao_logistica","Nota_fiscal","AWB","OBS"
];

const tableKeysBySection = { aog:"aog", war:"war", fast:"fast", cargo:"cargo", cargas:"cargas", tools:"tools" };
const filtersByTable = { aog:{}, war:{}, fast:{}, cargo:{}, cargas:{}, tools:{} };
const pagerByTable = { aog:{page:1,pageSize:50}, war:{page:1,pageSize:50}, fast:{page:1,pageSize:50}, cargo:{page:1,pageSize:50}, cargas:{page:1,pageSize:50}, tools:{page:1,pageSize:50} };

let dados = [];
let cacheByTable = { aog:[], war:[], fast:[], cargo:[], cargas:[], tools:[] };

function escapeHtml(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function normalizeText(v){
  try{
    return String(v ?? "").toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/[\s\-_.\/\\(){}\[\],;:|]+/g,"");
  }catch(e){ return String(v ?? "").toLowerCase().trim(); }
}
function statusCategory(statusRaw){
  const s = normalizeText(statusRaw || "");
  if(s.includes("outras") || s.includes("mtldivergente")) return "orange";
  if(s.includes("emfiladeatendimento") || s.includes("aguardandoseparacao") || s.includes("mtlzero")) return "red";
  if(s.includes("prontoparaenvio") || s.includes("log1transito")) return "yellow";
  if(s.includes("base") || s.includes("recebidonodestino")) return "green";
  return "default";
}
function statusTagHtml(txt){
  const cat = statusCategory(txt);
  return `<span class="statusTag status-${cat}" title="${escapeHtml(txt)}"><span class="statusDot"></span><span>${escapeHtml(txt)}</span></span>`;
}

function jsonp(params, timeoutMs=20000){
  return new Promise((resolve,reject)=>{
    const cbName = "__cb_" + Math.random().toString(36).slice(2);
    const t = setTimeout(()=>{ cleanup(); reject(new Error("timeout JSONP")); }, timeoutMs);

    function cleanup(){
      clearTimeout(t);
      try{ delete window[cbName]; }catch(e){}
      if(script && script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = (data)=>{ cleanup(); resolve(data); };

    const url = new URL(GAS_WEBAPP_URL);
    Object.keys(params||{}).forEach(k=> url.searchParams.set(k, String(params[k])));
    url.searchParams.set("callback", cbName);
    url.searchParams.set("ts", Date.now());

    const script = document.createElement("script");
    script.src = url.toString();
    script.onerror = ()=>{ cleanup(); reject(new Error("erro ao carregar script JSONP")); };
    document.head.appendChild(script);
  });
}

/* UI */
function openTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById(id);
  if(el) el.classList.add('active');
  document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderActive();
}
setInterval(()=>{ const el = document.getElementById("clock"); if(el) el.innerText = new Date().toLocaleTimeString("pt-BR"); }, 1000);

function buildCaches(){
  const out = { aog:[], war:[], fast:[], cargo:[], cargas:[], tools:[] };
  for(const r of (Array.isArray(dados)?dados:[])){
    out.cargo.push(r);
    const crit = String(r && r.Criticidade || "").toUpperCase();
    if(crit.includes("AOG")) out.aog.push(r);
    if(crit.includes("WAR")) out.war.push(r);
    if(crit.includes("LIMOPS")) out.fast.push(r);
    // cargas/tools: heurística simples
    if(normalizeText(r && r.Descricao_logistica).includes("carga")) out.cargas.push(r);
    const tipo = String(r && (r.Tipo ?? "")).trim();
    if(tipo==="2" || normalizeText(tipo).includes("ferramenta")) out.tools.push(r);
  }
  cacheByTable = out;
}

function getFilteredRows(tk){
  let rows = (cacheByTable[tk]||[]);
  const f = filtersByTable[tk]||{};
  const active = Object.keys(f).filter(k=>String(f[k]||"").trim()!=="");
  if(active.length){
    rows = rows.filter(r=>{
      for(const k of active){
        const v = String(f[k]||"").trim().toLowerCase();
        const cell = String((r && r[k]) ?? "").toLowerCase();
        if(!cell.includes(v)) return false;
      }
      return true;
    });
  }
  return rows;
}

function renderPager(tk, totalRows){
  const bar = document.getElementById("pager-"+tk);
  if(!bar) return;
  const pg = pagerByTable[tk];
  const totalPages = Math.max(1, Math.ceil((totalRows||0) / (pg.pageSize||50)));
  if(pg.page>totalPages) pg.page=totalPages;
  const from = totalRows ? ((pg.page-1)*pg.pageSize+1) : 0;
  const to = Math.min(totalRows, pg.page*pg.pageSize);

  const canPrev = pg.page>1, canNext = pg.page<totalPages;
  bar.innerHTML = `
    <button class="noteBtn" style="padding:6px 10px; ${canPrev?"":"opacity:.45;cursor:not-allowed"}" ${canPrev?`onclick="setPage('${tk}',${pg.page-1})"`:""}>◀ Prev</button>
    <button class="noteBtn" style="padding:6px 10px; ${canNext?"":"opacity:.45;cursor:not-allowed"}" ${canNext?`onclick="setPage('${tk}',${pg.page+1})"`:""}>Próx ▶</button>
    <span>Página <b>${pg.page}</b> / ${totalPages}</span>
    <span>Mostrando <b>${from}</b>–<b>${to}</b> de <b>${totalRows}</b></span>
    <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <span>Linhas/página</span>
      <select onchange="setPageSize('${tk}', this.value)" style="padding:6px;border:1px solid #e5e7eb;border-radius:8px">
        ${[50,75,100].map(n=>`<option value="${n}" ${n===pg.pageSize?"selected":""}>${n}</option>`).join("")}
      </select>
    </span>
  `;
}
function setPage(tk, p){ pagerByTable[tk].page = Number(p||1); renderTable(tk); }
function setPageSize(tk, s){ pagerByTable[tk].pageSize = Math.max(50, Math.min(200, Number(s||50))); pagerByTable[tk].page=1; renderTable(tk); }

function renderTable(tk){
  const tbl = document.getElementById("tbl-"+tk);
  if(!tbl) return;

  const allRows = getFilteredRows(tk);
  const pg = pagerByTable[tk];
  renderPager(tk, allRows.length);

  const start = (pg.page-1)*pg.pageSize;
  const pageRows = allRows.slice(start, start+pg.pageSize);

  let html = `<thead><tr>`;
  html += cols.map(c=>`<th>${c}</th>`).join("");
  html += `</tr></thead>`;

  html += `<thead class="filterRow"><tr>`;
  html += cols.map(c=>`
    <th><input class="filter" placeholder="filtrar... (ENTER aplica)"
      value="${escapeHtml(filtersByTable[tk][c]||"")}"
      onkeydown="if(event.key==='Enter'){applyFilter('${tk}','${c}',this.value)}"></th>`).join("");
  html += `</tr></thead>`;

  html += `<tbody>`;
  html += pageRows.map(r=>{
    return `<tr>` + cols.map(c=>{
      if(c==="Status_material_ferramenta") return `<td>${statusTagHtml(r[c]??"")}</td>`;
      return `<td>${escapeHtml(r[c]??"")}</td>`;
    }).join("") + `</tr>`;
  }).join("");
  html += `</tbody>`;
  tbl.innerHTML = html;
}
function applyFilter(tk, col, value){
  filtersByTable[tk][col] = String(value||"").trim().toLowerCase();
  pagerByTable[tk].page=1;
  renderTable(tk);
}

function renderActive(){
  const active = document.querySelector(".section.active");
  const tk = active ? tableKeysBySection[active.id] : null;
  if(tk) renderTable(tk);
}

function setLastInfo(msg){
  const el = document.getElementById("lastInfo");
  if(el) el.innerText = msg;
}

/* DATA */
async function loadDados(){
  setLastInfo("Carregando dados...");
  const res = await jsonp({ dados: "1" }, 30000);
  if(!Array.isArray(res)) throw new Error("Resposta inválida (esperado Array)");
  dados = res;
  buildCaches();
  setLastInfo(`OK: ${dados.length} linhas • ${new Date().toLocaleTimeString("pt-BR")}`);
  renderActive();
}

async function refreshNowUrl(){
  try{ await loadDados(); }catch(e){ setLastInfo("ERRO: " + (e && e.message ? e.message : e)); }
}
async function forceUpdateNow(){
  try{
    setLastInfo("Forçando atualização no Sheets...");
    await jsonp({ forceUpdate: "1" }, 60000);
    await loadDados();
  }catch(e){
    setLastInfo("ERRO forceUpdate: " + (e && e.message ? e.message : e));
  }
}

let __timer = null;
function schedule(){
  if(__timer) clearInterval(__timer);
  __timer = setInterval(()=>{ refreshNowUrl(); }, REFRESH_EVERY_MS);
}

(async function init(){
  try{
    await loadDados();
  }catch(e){
    setLastInfo("ERRO inicial: " + (e && e.message ? e.message : e));
  }
  schedule();
})();
</script>
</body>
</html>
